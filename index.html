<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Wine EDM 產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Noto Sans TC', Arial, sans-serif;
    background: #EDE7DA; color: #2E2A24;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; background: #2E2A24; color: #FAF6EF;
    position: sticky; top: 0; z-index: 50;
    flex-wrap: wrap;
  }
  header img { width: 34px; height: auto; }
  header h1 { font-size: 16px; font-weight: 700; margin: 0; flex: 1; }
  #theme-picker { display: flex; align-items: center; gap: 6px; }
  #theme-picker span { font-size: 12px; color: #C9BFA9; }
  .swatch {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; padding: 0;
  }
  .swatch.active { border-color: #FAF6EF; }

  main { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }

  .panel {
    background: #FAF6EF; border: 1px solid #E3DAC7; border-radius: 10px;
    padding: 16px; margin-bottom: 18px;
  }
  .url-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .url-row input[type=text] {
    flex: 1; min-width: 220px; padding: 10px 12px; border-radius: 6px;
    border: 1px solid #E3DAC7; font-size: 14px;
  }
  button.primary {
    background: #B8935A; color: #3A2E14; border: none; border-radius: 6px;
    padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  button.secondary {
    background: transparent; color: #5C1A2B; border: 1px solid #5C1A2B; border-radius: 6px;
    padding: 8px 14px; font-size: 13px; cursor: pointer;
  }
  button.danger {
    background: transparent; color: #9B4A4A; border: 1px solid #C79A9A; border-radius: 6px;
    padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  #status { font-size: 13px; margin-top: 8px; min-height: 18px; }
  #status.error { color: #A32D2D; }
  #status.loading { color: #7A6A45; }
  #status.ok { color: #3B6D11; }

  .card {
    background: #FFFFFF; border: 1px solid #E3DAC7; border-radius: 10px;
    padding: 16px; margin-bottom: 16px;
  }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card-head strong { font-size: 13px; color: #5C1A2B; }
  .field { margin-bottom: 10px; }
  .field label { display:block; font-size: 11px; color: #9B9385; margin-bottom: 3px; }
  .field input[type=text], .field textarea {
    width: 100%; padding: 7px 9px; border-radius: 5px; border: 1px solid #E3DAC7;
    font-size: 13px; font-family: inherit; resize: vertical;
  }
  .field textarea { min-height: 54px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .thumb { width: 60px; height: 60px; object-fit: contain; border: 1px solid #E3DAC7; border-radius: 6px; background:#fff; }
  .sale-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 8px; }
  .card-actions { display: flex; justify-content: space-between; margin-top: 6px; }
  .move-btns button { background: none; border: none; cursor: pointer; font-size: 14px; color: #9B9385; }

  .bottom-actions {
    position: sticky; bottom: 0; background: #EDE7DA; padding: 14px 0;
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    border-top: 1px solid #E3DAC7;
  }

  #preview-wrap { margin-top: 20px; }
  #preview-frame {
    width: 100%; height: 900px; border: 1px solid #E3DAC7; border-radius: 8px; background: #fff;
  }
  .hint { font-size: 12px; color: #7A7264; line-height: 1.6; }
  .draft-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; border: 1px solid #E3DAC7; border-radius: 6px; margin-bottom: 6px;
    font-size: 12px; background: #fff;
  }
  .draft-item .draft-meta { color: #7A7264; }
  .draft-item .draft-actions button { margin-left: 6px; }
  #autosave-indicator { font-size: 11px; color: #7A9B6B; min-height: 14px; }
  #publish-result { font-size: 13px; min-height: 20px; }
  #publish-result.loading { color: #7A6A45; }
  #publish-result.error { color: #A32D2D; }
  .publish-link-row { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .publish-link-row input {
    width: min(420px, 80vw); padding: 6px 8px; border-radius: 5px; border: 1px solid #E3DAC7; font-size: 12px;
  }
</style>
</head>

  <h1>Le Wine EDM 產生器</h1>
  <div id="theme-picker">
    <span>配色</span>
    <button class="swatch active" data-theme="a" style="background:linear-gradient(135deg,#5C1A2B 50%,#B8935A 50%)"></button>
    <button class="swatch" data-theme="b" style="background:linear-gradient(135deg,#8A5A2B 50%,#C79A3E 50%)"></button>
    <button class="swatch" data-theme="c" style="background:linear-gradient(135deg,#1D3A5F 50%,#B08D57 50%)"></button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="field">
      <label>頁首標題</label>
      <input type="text" id="header-title-input" value="本週精選酒款">
    </div>
    <div class="url-row">
      <input type="text" id="url-input" placeholder="貼上商品頁網址，例如 https://www.lewine.com.tw/product/xxx/">
      <button class="primary" id="fetch-btn">抓取酒款</button>
    </div>
    <div id="status"></div>
    <p class="hint">抓取結果是「草稿」，酒名／年份／價格／文字都會放進下方可編輯欄位，送出前請務必核對一次，尤其是價格與年份。</p>
  </div>

  <div id="cards"></div>

  <div class="panel" style="text-align:center;">
    <button class="secondary" id="add-blank-btn">＋ 手動新增一款空白酒款</button>
  </div>

  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
      <strong style="font-size:13px; color:#5C1A2B;">暫存區（存在這台電腦、這個瀏覽器裡）</strong>
      <div style="display:flex; gap:8px;">
        <input type="text" id="draft-name-input" placeholder="暫存檔名稱，例如：林小姐0717" style="padding:6px 8px; border-radius:5px; border:1px solid #E3DAC7; font-size:12px;">
        <button class="secondary" id="save-draft-btn">存成新暫存檔</button>
      </div>
    </div>
    <p class="hint" style="margin-top:8px;">編輯內容會每隔幾秒自動存檔在這台電腦（換瀏覽器或清瀏覽器資料會消失），下次打開這個網址會自動還原上次的編輯進度。想保留多個版本可以用上面「存成新暫存檔」個別命名保存。</p>
    <div id="draft-list" style="margin-top:10px;"></div>
  </div>

  <div id="preview-wrap">
    <div class="panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong style="font-size:13px; color:#5C1A2B;">即時預覽</strong>
        <button class="secondary" id="refresh-preview-btn">重新整理預覽</button>
      </div>
      <iframe id="preview-frame" style="margin-top:10px;"></iframe>
    </div>
  </div>
</main>

<div class="bottom-actions" style="flex-direction:column; gap:4px;">
  <div id="autosave-indicator"></div>
  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
    <button class="primary" id="publish-btn">產生可分享的網址</button>
    <button class="secondary" id="pdf-btn">轉存 PDF（開啟列印視窗）</button>
    <button class="secondary" id="download-btn">下載完整 HTML（存到電腦）</button>
  </div>
  <div id="publish-result"></div>
</div>

      <circle cx="356" cy="12" r="2" fill="#6E3B4A" stroke="none"/>
      <circle cx="356" cy="18" r="2" fill="#6E3B4A" stroke="none"/>
      <circle cx="288" cy="15" r="2" fill="#6E3B4A" stroke="none"/>
      <circle cx="294" cy="12" r="2" fill="#6E3B4A" stroke="none"/>
      <circle cx="294" cy="18" r="2" fill="#6E3B4A" stroke="none"/>
    </g>
  </svg>`;
}

function glassIcon(color) {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.4" style="display:block; margin:0 auto;">
    <path d="M7 3h10l-1.2 8.2a3.8 3.8 0 0 1-3.8 3.3 3.8 3.8 0 0 1-3.8-3.3L7 3z"/>
    <line x1="12" y1="14.5" x2="12" y2="20"/>
    <line x1="8.5" y1="20" x2="15.5" y2="20"/>
  </svg>`;
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function badgesHTML(scores, color) {
  const cells = (scores || []).filter(Boolean).map(s =>
    `<td style="padding:0 6px;"><span style="display:inline-block; border:1px solid ${color}; color:${color}; font-size:11px; font-weight:700; padding:3px 9px; letter-spacing:0.5px;">${esc(s)}</span></td>`
  ).join('');
  if (!cells) return '';
  return `<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;"><tr>${cells}</tr></table>`;
}

function priceHTML(p, v) {
  if (p.sale) {
    return `<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto; background-color:#FFFFFF; border:1px solid ${v.borderCard};">
      <tr><td style="padding:12px 28px; text-align:center;">
        <span style="font-size:12px; color:${v.muted}; text-decoration:line-through; margin-right:10px;">牌價 NT$ ${esc(p.listPrice)}</span>
        <span style="font-size:18px; font-weight:700; color:${v.accent};">優惠價 NT$ ${esc(p.salePrice)}</span>
      </td></tr></table>`;
  }
  return `<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto; background-color:#FFFFFF; border:1px solid ${v.borderCard};">
    <tr><td style="padding:12px 28px; text-align:center;">
      <span style="font-size:18px; font-weight:700; color:${v.accent};">${esc(p.priceLine || '洽詢')}</span>
    </td></tr></table>`;
}

function productBlockHTML(p, v, index, isLast) {
  const breakStyle = index > 0 ? ' page-break-before: always; break-before: page;' : '';
  let block = `
  <tr><td style="padding:24px 0 0; text-align:center;${breakStyle}">${glassIcon(v.accent)}</td></tr>
  <tr><td style="padding:6px 40px 4px; text-align:center;">
    <p style="margin:0; font-family:'Noto Serif TC', serif; font-weight:500; font-size:17px; line-height:1.5; color:${v.heading};">${esc(p.headline1)}</p>
    <p style="margin:2px 0 0; font-family:'Noto Serif TC', serif; font-weight:500; font-size:17px; line-height:1.5; color:${v.heading};">${esc(p.headline2)}</p>
  </td></tr>
  <tr><td style="padding:10px 0 0;"><div style="width:32px; height:2px; background-color:${v.accent}; margin:0 auto;"></div></td></tr>
  <tr><td style="padding:16px 40px 4px; text-align:center;">
    <img src="${esc(p.image)}" alt="${esc(p.en_name)} ${esc(p.name)}" width="140" style="display:block; margin:0 auto; max-width:140px; height:auto;">
  </td></tr>
  <tr><td style="padding:12px 40px 0; text-align:center;">
    <p style="margin:0; font-family:'Noto Serif TC', serif; font-weight:500; font-style:italic; font-size:13px; letter-spacing:1px; color:${v.muted}; text-transform:uppercase;">${esc(p.en_name)}</p>
  </td></tr>
  <tr><td style="padding:2px 40px 0; text-align:center;">
    <p style="margin:0; font-family:'Noto Serif TC', serif; font-weight:700; font-size:19px; color:${v.nameColor};">${esc(p.name)}</p>
  </td></tr>
  <tr><td style="padding:8px 40px 0; text-align:center;">
    <span style="display:inline-block; border:1px solid ${v.accent}; color:${v.accent}; font-size:11px; font-weight:700; padding:2px 10px; letter-spacing:1px; border-radius:9px;">${esc(p.vintage)}</span>
  </td></tr>
  <tr><td style="padding:10px 40px 0; text-align:center;">${badgesHTML(p.scores, v.badge)}</td></tr>
  <tr><td style="padding:16px 56px 0; text-align:center;">
    <div style="width:24px; height:1px; background-color:${v.borderCard}; margin:0 auto 10px;"></div>
    <p style="margin:0 0 4px; font-size:10px; font-weight:700; letter-spacing:2px; color:${v.accent}; text-transform:uppercase;">酒莊介紹</p>
    <p style="margin:0; font-size:12px; line-height:1.75; color:${v.bodyText};">${esc(p.winery)}</p>
  </td></tr>
  <tr><td style="padding:12px 56px 0; text-align:center;">
    <p style="margin:0; font-size:13px; line-height:1.8; color:${v.bodyText};">${esc(p.flavor)}</p>
  </td></tr>
  <tr><td style="padding:18px 40px 0; text-align:center;">${priceHTML(p, v)}</td></tr>
  `;
  if (!isLast) {
    block += `<tr><td style="padding:24px 0 0;">${vineDivider()}</td></tr>`;
  }
  return block;
}

function buildEmailHTML(themeKey) {
  const v = THEMES[themeKey].vars;
  const outerPattern = vinePatternURI(0.11, 0.10, 110);
  const cardPattern = vinePatternURI(0.045, 0.04, 92);
  const productsHTML = products.map((p, i) => productBlockHTML(p, v, i, i === products.length - 1)).join('\n');

  const firstImage = (products.find(p => p.image) || {}).image || '';
  const descNames = products.map(p => p.name || p.en_name).filter(Boolean).join('、');
  const ogDescription = descNames ? `${descNames} — 限時優惠中` : 'Le Wine 精選酒款限時優惠中';

  return `<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${esc(headerTitle)}</title>
<meta property="og:title" content="${esc(headerTitle)}">
<meta property="og:description" content="${esc(ogDescription)}">
${firstImage ? `<meta property="og:image" content="${esc(firstImage)}">` : ''}
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  @media print {
    body { background: #fff !important; }
  }
</style>
</head>
<body style="margin:0; padding:0; background-color:${v.bgOuter}; background-image:url(&quot;${outerPattern}&quot;); background-repeat:repeat; font-family:'Noto Sans TC', Arial, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:${v.bgOuter}; background-image:url(&quot;${outerPattern}&quot;); background-repeat:repeat; padding:32px 0;">
<tr><td align="center">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px; max-width:600px; background-color:${v.bgCard}; background-image:url(&quot;${cardPattern}&quot;); background-repeat:repeat; border:1px solid ${v.borderCard};">
  <tr><td style="padding:24px 24px 6px; text-align:center;">
    <img src="${LOGO_DATA_URI}" alt="Le Wine 知淳興業" width="86" style="display:block; width:86px; height:auto; margin:0 auto;">
  </td></tr>
  <tr><td style="padding:6px 40px 0; text-align:center;">
    <p style="margin:0; font-family:'Noto Serif TC', serif; font-weight:700; font-size:22px; color:${v.heading}; letter-spacing:1px;">${esc(headerTitle)}</p>
  </td></tr>
  <tr><td style="padding:14px 0 0;">${vineDivider()}</td></tr>
  ${productsHTML}
  <tr><td style="padding:26px 0 0;">${vineDivider()}</td></tr>
  <tr><td style="padding:16px 24px; text-align:center; background-color:${v.warningBg};">
    <p style="margin:0; font-size:32px; line-height:1; font-weight:700; color:${v.heading}; letter-spacing:1px;">禁止酒駕　未滿十八歲禁止飲酒</p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>`;
}

function updatePreview() {
  const iframe = document.getElementById('preview-frame');
  iframe.srcdoc = buildEmailHTML(currentTheme);
}

function fieldRow(label, key, i, type) {
  const val = esc(products[i][key]);
  if (type === 'textarea') {
    return `<div class="field"><label>${label}</label><textarea data-i="${i}" data-key="${key}">${val}</textarea></div>`;
  }
  return `<div class="field"><label>${label}</label><input type="text" data-i="${i}" data-key="${key}" value="${val}"></div>`;
}

function renderCards() {
  const wrap = document.getElementById('cards');
  wrap.innerHTML = products.map((p, i) => `
    <div class="card" data-index="${i}">
      <div class="card-head">
        <strong>酒款 ${i+1}</strong>
        <div class="move-btns">
          <button data-act="up" data-i="${i}" title="上移">↑</button>
          <button data-act="down" data-i="${i}" title="下移">↓</button>
          <button class="danger" data-act="remove" data-i="${i}">刪除</button>
        </div>
      </div>
      <div class="row2">
        <img class="thumb" src="${esc(p.image) || ''}" onerror="this.style.opacity=0.2" alt="">
        ${fieldRow('酒瓶照片網址','image', i)}
      </div>
      <div class="row2">
        ${fieldRow('英文酒名','en_name', i)}
        ${fieldRow('中文酒名','name', i)}
      </div>
      <div class="row2">
        ${fieldRow('年份','vintage', i)}
        <div class="field"><label>國際評分（逗號分隔，如 RP 95, WS 93）</label>
          <input type="text" data-i="${i}" data-key="scores" value="${esc((p.scores||[]).join(', '))}">
        </div>
      </div>
      <div class="row2">
        ${fieldRow('大標一','headline1', i)}
        ${fieldRow('大標二','headline2', i)}
      </div>
      ${fieldRow('酒莊介紹','winery', i, 'textarea')}
      ${fieldRow('風味描述','flavor', i, 'textarea')}
      <div class="sale-toggle">
        <input type="checkbox" data-i="${i}" data-key="sale" id="sale-${i}" ${p.sale ? 'checked' : ''}>
        <label for="sale-${i}">有牌價／優惠價（否則顯示單一價格文字）</label>
      </div>
      <div class="row3">
        ${fieldRow('牌價（數字）','listPrice', i)}
        ${fieldRow('優惠價（數字）','salePrice', i)}
        ${fieldRow('單一價格文字（無折扣時）','priceLine', i)}
      </div>
    </div>
  `).join('');

  wrap.querySelectorAll('input[type=text], textarea').forEach(el => {
    el.addEventListener('input', () => {
      const i = +el.dataset.i, key = el.dataset.key;
      if (key === 'scores') {
        products[i][key] = el.value.split(',').map(s => s.trim()).filter(Boolean);
      } else {
        products[i][key] = el.value;
      }
      scheduleAutosave();
    });
  });
  wrap.querySelectorAll('input[type=checkbox]').forEach(el => {
    el.addEventListener('change', () => {
      products[+el.dataset.i][el.dataset.key] = el.checked;
      scheduleAutosave();
    });
  });
  wrap.querySelectorAll('button[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i, act = btn.dataset.act;
      if (act === 'remove') products.splice(i, 1);
      if (act === 'up' && i > 0) [products[i-1], products[i]] = [products[i], products[i-1]];
      if (act === 'down' && i < products.length - 1) [products[i+1], products[i]] = [products[i], products[i+1]];
      renderCards();
      scheduleAutosave();
    });
  });
}

document.getElementById('add-blank-btn').addEventListener('click', () => {
  products.push(emptyProduct());
  renderCards();
  scheduleAutosave();
});

// ---------- 自動儲存 / 暫存區 ----------
const AUTOSAVE_KEY = 'lewine_edm_autosave';
const DRAFTS_KEY = 'lewine_edm_drafts';
let autosaveTimer = null;

function currentSnapshot() {
  return { headerTitle, theme: currentTheme, products, savedAt: Date.now() };
}

function scheduleAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    try {
      localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(currentSnapshot()));
      const ind = document.getElementById('autosave-indicator');
      if (ind) {
        const t = new Date().toLocaleTimeString('zh-TW', { hour12: false });
        ind.textContent = `已自動儲存（${t}）`;
      }
    } catch (e) { /* localStorage 滿了或不可用，忽略 */ }
  }, 800);
}

function loadSnapshot(snap) {
  headerTitle = snap.headerTitle || '本週精選酒款';
  currentTheme = snap.theme || 'a';
  products = (snap.products && snap.products.length) ? snap.products : [emptyProduct()];
  document.getElementById('header-title-input').value = headerTitle;
  document.querySelectorAll('.swatch').forEach(b => b.classList.toggle('active', b.dataset.theme === currentTheme));
  renderCards();
  updatePreview();
}

function getDrafts() {
  try { return JSON.parse(localStorage.getItem(DRAFTS_KEY) || '[]'); }
  catch (e) { return []; }
}

function saveDrafts(list) {
  localStorage.setItem(DRAFTS_KEY, JSON.stringify(list));
}

function renderDraftList() {
  const wrap = document.getElementById('draft-list');
  const drafts = getDrafts();
  if (!drafts.length) {
    wrap.innerHTML = '<p class="hint">目前沒有已命名的暫存檔。</p>';
    return;
  }
  wrap.innerHTML = drafts.map(d => {
    const dt = new Date(d.savedAt).toLocaleString('zh-TW', { hour12: false });
    return `<div class="draft-item">
      <span>${esc(d.name)} <span class="draft-meta">（${dt}）</span></span>
      <span class="draft-actions">
        <button class="secondary" data-draft-act="load" data-id="${d.id}">載入</button>
        <button class="danger" data-draft-act="delete" data-id="${d.id}">刪除</button>
      </span>
    </div>`;
  }).join('');
  wrap.querySelectorAll('[data-draft-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const drafts2 = getDrafts();
      const target = drafts2.find(d => String(d.id) === id);
      if (btn.dataset.draftAct === 'load' && target) {
        loadSnapshot(target);
        scheduleAutosave();
      } else if (btn.dataset.draftAct === 'delete') {
        saveDrafts(drafts2.filter(d => String(d.id) !== id));
        renderDraftList();
      }
    });
  });
}

document.getElementById('save-draft-btn').addEventListener('click', () => {
  const nameInput = document.getElementById('draft-name-input');
  const name = nameInput.value.trim() || `暫存 ${new Date().toLocaleString('zh-TW', { hour12: false })}`;
  const drafts = getDrafts();
  drafts.unshift({ id: Date.now(), name, ...currentSnapshot() });
  saveDrafts(drafts.slice(0, 30)); // 最多保留 30 筆，避免無限長大
  nameInput.value = '';
  renderDraftList();
});

document.getElementById('header-title-input').addEventListener('input', (e) => {
  headerTitle = e.target.value;
  updatePreview();
  scheduleAutosave();
});


document.getElementById('fetch-btn').addEventListener('click', async () => {
  const input = document.getElementById('url-input');
  const status = document.getElementById('status');
  const url = input.value.trim();
  if (!url) return;
  status.className = 'loading';
  status.textContent = '抓取中，請稍候…';
  try {
    const resp = await fetch('/api/parse?url=' + encodeURIComponent(url));
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '抓取失敗');
    const p = emptyProduct();
    Object.assign(p, {
      en_name: data.en_name || '', name: data.name || '', vintage: data.vintage || '',
      image: data.image || '', headline1: data.headline1 || '', headline2: data.headline2 || '',
      winery: data.winery || '', flavor: data.flavor || '', scores: data.scores || [],
      sale: !!data.sale, listPrice: data.listPrice || '', salePrice: data.salePrice || '',
      priceLine: data.priceLine || '',
    });
    products.push(p);
    renderCards();
    status.className = 'ok';
    status.textContent = '已加入，請往下檢查並修正欄位內容（尤其是年份與價格）。';
    input.value = '';
    scheduleAutosave();
  } catch (e) {
    status.className = 'error';
    status.textContent = e.message || '發生錯誤，請確認網址是否正確。';
  }
});

document.querySelectorAll('.swatch').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTheme = btn.dataset.theme;
    document.querySelectorAll('.swatch').forEach(b => b.classList.toggle('active', b === btn));
    updatePreview();
    scheduleAutosave();
  });
});

document.getElementById('refresh-preview-btn').addEventListener('click', updatePreview);

document.getElementById('pdf-btn').addEventListener('click', () => {
  const result = document.getElementById('publish-result');
  result.className = '';
  result.textContent = '正在準備列印視窗…每款酒會各自獨立一頁，請在跳出的視窗中選擇「另存為 PDF」。';

  const html = buildEmailHTML(currentTheme);
  let printFrame = document.getElementById('pdf-print-frame');
  if (printFrame) printFrame.remove();

  printFrame = document.createElement('iframe');
  printFrame.id = 'pdf-print-frame';
  printFrame.style.position = 'fixed';
  printFrame.style.right = '0';
  printFrame.style.bottom = '0';
  printFrame.style.width = '0';
  printFrame.style.height = '0';
  printFrame.style.border = '0';
  document.body.appendChild(printFrame);

  printFrame.onload = () => {
    setTimeout(() => {
      try {
        printFrame.contentWindow.focus();
        printFrame.contentWindow.print();
        result.textContent = '列印視窗已開啟，請選擇「另存為 PDF」完成存檔。';
      } catch (e) {
        result.className = 'error';
        result.textContent = '無法開啟列印視窗，請改用「產生可分享的網址」，打開該網址後手動按 Ctrl+P。';
      }
    }, 300); // 留一點時間讓字體與圖片載入
  };

  printFrame.srcdoc = html;
});

document.getElementById('publish-btn').addEventListener('click', async () => {
  const result = document.getElementById('publish-result');
  result.className = 'loading';
  result.textContent = '發布中，請稍候…';
  try {
    const html = buildEmailHTML(currentTheme);
    const resp = await fetch('/api/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html, title: headerTitle }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '發布失敗');
    result.className = '';
    result.innerHTML = '';
    const row = document.createElement('div');
    row.className = 'publish-link-row';
    const input = document.createElement('input');
    input.type = 'text';
    input.readOnly = true;
    input.value = data.url;
    const copyBtn = document.createElement('button');
    copyBtn.className = 'secondary';
    copyBtn.textContent = '複製連結';
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(data.url);
        copyBtn.textContent = '已複製！';
        setTimeout(() => { copyBtn.textContent = '複製連結'; }, 1500);
      } catch (e) {
        input.select();
      }
    });
    const openBtn = document.createElement('a');
    openBtn.href = data.url;
    openBtn.target = '_blank';
    openBtn.rel = 'noopener';
    openBtn.className = 'secondary';
    openBtn.style.textDecoration = 'none';
    openBtn.style.display = 'inline-block';
    openBtn.style.padding = '8px 14px';
    openBtn.textContent = '開啟預覽';
    row.appendChild(input);
    row.appendChild(copyBtn);
    row.appendChild(openBtn);
    result.appendChild(row);
  } catch (e) {
    result.className = 'error';
    result.textContent = e.message || '發布失敗，請稍後再試。';
  }
});

document.getElementById('download-btn').addEventListener('click', () => {
  const html = buildEmailHTML(currentTheme);
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lewine-edm.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

// 初始化：優先還原上次自動儲存的內容，否則從一張空白卡片開始
(function init() {
  let restored = false;
  try {
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if (raw) {
      const snap = JSON.parse(raw);
      if (snap && snap.products && snap.products.length) {
        loadSnapshot(snap);
        const ind = document.getElementById('autosave-indicator');
        if (ind) ind.textContent = '已還原上次編輯進度';
        restored = true;
      }
    }
  } catch (e) { /* 忽略解析錯誤 */ }
  if (!restored) {
    products.push(emptyProduct());
    renderCards();
    updatePreview();
  }
  renderDraftList();
})();
</script>
</body>
</html>
